<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Bhakti Enterprises | Mobile Shop in Solapur</title>
    <meta
      name="description"
      content="Bhakti Enterprises is a trusted mobile shop in Solapur offering smartphones, accessories, and home appliances at great prices."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bhakti-enterprises-gilt.vercel.app/" />

    <!-- Author / Developer -->
    <meta name="author" content="Bhakti Enterprises" />
    <meta name="developer" content="Pradyumna Pawar" />
    <meta name="designer" content="Pradyumna Pawar" />

    <!-- Theme -->
    <meta name="theme-color" content="#102a54" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Bhakti Enterprises | Solapur" />
    <meta
      property="og:description"
      content="Multi-brand mobiles and electronics store in Solapur."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bhakti-enterprises-gilt.vercel.app/" />
    <meta property="og:image" content="/brand-crest.svg" />
    <meta property="og:site_name" content="Bhakti Enterprises" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bhakti Enterprises | Solapur" />
    <meta
      name="twitter:description"
      content="Best mobile and electronics store in Solapur."
    />
    <meta name="twitter:image" content="/brand-crest.svg" />

    <!-- Local SEO -->
    <meta name="geo.region" content="IN-MH" />
    <meta name="geo.placename" content="Solapur" />
    <meta name="geo.position" content="17.6599;75.9064" />
    <meta name="ICBM" content="17.6599, 75.9064" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- STRUCTURED DATA: BUSINESS -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ElectronicsStore",
        "name": "Bhakti Enterprises",
        "image": "/brand-crest.svg",
        "description": "Multi-brand mobiles and electronic home appliances in Solapur",
        "url": "https://bhakti-enterprises-gilt.vercel.app/",
        "telephone": "+91 90219 29391",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "BHAJI MARKET, 34/3/45, 70 Feet Rd, Near Vishnupant Kothe School",
          "addressLocality": "Solapur",
          "addressRegion": "Maharashtra",
          "postalCode": "413001",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 17.6599,
          "longitude": 75.9064
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday",
              "Sunday"
            ],
            "opens": "10:00",
            "closes": "22:00"
          }
        ],
        "priceRange": "₹₹",
        "paymentAccepted": ["Cash", "Debit Card", "UPI"],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "5.0",
          "reviewCount": "1"
        }
      }
    </script>

    <!-- STRUCTURED DATA: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What does Bhakti Enterprises sell?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The store offers multi-brand mobiles, accessories, and electronic home appliances."
            }
          },
          {
            "@type": "Question",
            "name": "Which payment methods are available?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cash, debit cards, and UPI payments are accepted."
            }
          },
          {
            "@type": "Question",
            "name": "When is the shop open?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Open daily from 10:00 AM to 10:00 PM."
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <!-- No JS fallback -->
    <noscript>
      <strong>This website requires JavaScript to function properly.</strong>
    </noscript>

    <!-- App Root -->
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
